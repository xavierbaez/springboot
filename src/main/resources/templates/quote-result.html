<!DOCTYPE html>
<html>
<head>
    <title>Pacific Life AI Quote Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('/images/PacLife-background.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
        }
        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 500px;
            border-radius: 16px;
        }
    </style>
</head>
<body>
<div class="overlay">
    <div class="card p-4 shadow-lg bg-white">
        <h1 class="mb-3">Estimated Monthly Premium</h1>
        <p><strong>Age:</strong> <span th:text="${age}"></span></p>
        <p><strong>Coverage:</strong> $<span th:text="${coverage}"></span></p>
        <p><strong>Smoker:</strong> <span th:text="${smoker}"></span></p>
        <p><strong>Diabetes:</strong> <span th:text="${diabetes}"></span></p>
        <h2 class="text-primary">
            $<span th:text="${price != 'N/A' ? price : '0'}"></span> / month
            <span th:if="${price == 'N/A'}">(N/A)</span>
        </h2>
        <a href="/" class="btn btn-outline-primary mt-3">Back</a>
        <p class="text-muted" th:text="${message}"></p>
    </div>
</div>
</body>
</html>
