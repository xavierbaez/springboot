<!DOCTYPE html>
<html>
<head>
    <title>Pacific Life Demo</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('/images/PacLife-background.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 12px;
            width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="card shadow-lg">

        <h1>Life Insurance Quote</h1>

        <form action="/quote" method="post">
            <input class="form-control mb-3" type="number" name="age" placeholder="Age" min="18" max="90" required>

            <select class="form-control mb-3" name="coverage" required>
                <option value="">Coverage Amount</option>
                <option value="100000">100,000</option>
                <option value="250000">250,000</option>
                <option value="500000">500,000</option>
                <option value="1000000">1,000,000</option>
            </select>

            <select class="form-control mb-3" name="smoker" required>
                <option value="">Smoker?</option>
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>

            <select class="form-control mb-3" name="diabetes" required>
                <option value="">Diabetes?</option>
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>

            <button class="btn btn-primary w-100" type="submit">Get Quote</button>
        </form>

    </div>
</div>

</body>
</html>
