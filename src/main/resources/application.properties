spring.application.name=pacificlife

# OpenAI (uses environment variable)
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Disable database (avoid startup errors)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Server
server.port=8080
spring.main.web-application-type=servlet
#React properties
react.host=http://localhost
react.port=5173
# CORS allowed origin for local React dev
app.cors.allowed-origin=${react.host}:${react.port}